name: Build travel-journal collage

# Two triggers:
#   • schedule    — nightly, builds a collage from the day's uploaded photos.
#   • repository_dispatch (type "build-collage") — fired by the Lambda /build
#     endpoint when someone taps "Create collage now" in Questr. The event's
#     client_payload may carry a {"date": "YYYY-MM-DD"} to build a specific day.
on:
  schedule:
    - cron: "0 22 * * *"      # 22:00 UTC daily (after most of the day's uploads)
  repository_dispatch:
    types: [build-collage]
  workflow_dispatch:           # manual "Run workflow" button, for testing
    inputs:
      date:
        description: "Day to build (YYYY-MM-DD, blank = today UTC)"
        required: false
        default: ""

concurrency:
  # Never build the same day twice at once; a newer request wins.
  group: collage-${{ github.event.client_payload.date || github.event.inputs.date || 'today' }}
  cancel-in-progress: true

jobs:
  collage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: collage/requirements.txt

      - name: Install dependencies
        run: pip install -r collage/requirements.txt

      - name: Resolve target date
        id: date
        run: |
          D="${{ github.event.client_payload.date || github.event.inputs.date }}"
          if [ -z "$D" ]; then D="$(date -u +%F)"; fi
          echo "date=$D" >> "$GITHUB_OUTPUT"
          echo "Building collage for $D"

      - name: Build collage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-3' }}
          PHOTO_BUCKET: ${{ secrets.PHOTO_BUCKET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collage.build --date "${{ steps.date.outputs.date }}"
